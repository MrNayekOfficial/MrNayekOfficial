name: README Auto Update

on:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: auto-update-readme
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update README data
        run: node .github/scripts/update-readme.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USERNAME: MrNayekOfficial

      - name: Commit changes
        run: |
          if git diff --quiet README.md; then
            echo "README data is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: auto-update README live data"
          git pull --rebase origin main
          git push
